<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NobleHabits - Premium Self-Improvement</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a1a;
            --secondary: #333;
            --bg: #f8f9fa;
            --white: #ffffff;
            --text: #333;
            --text-light: #666;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            color: var(--text);
            background: var(--bg);
            overflow-x: hidden;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            box-shadow: 0 2px 40px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            position: relative;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .nav-links a.active,
        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -8px;
            left: 0;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .nav-links a.active::after,
        .nav-links a:hover::after {
            width: 100%;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            padding: 5px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: var(--primary);
            transition: 0.3s;
            border-radius: 2px;
        }

        /* Hero */
        .hero {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 0 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .hero-content {
            max-width: 800px;
            z-index: 1;
            position: relative;
        }

        .hero h1 {
            font-size: clamp(3.5rem, 8vw, 6rem);
            font-weight: 800;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .hero p {
            font-size: 1.4rem;
            margin-bottom: 3rem;
            opacity: 0.95;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-btn {
            display: inline-block;
            background: var(--white);
            color: var(--primary);
            padding: 1.3rem 3.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 20px 60px rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .cta-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .cta-btn:hover::before {
            left: 100%;
        }

        .cta-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 80px rgba(255,255,255,0.4);
        }

        /* Sections */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 8rem 2rem 4rem;
        }

        .section {
            margin-bottom: 10rem;
            scroll-margin-top: 120px;
            opacity: 0;
            transform: translateY(60px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section.animate {
            opacity: 1;
            transform: translateY(0);
        }

        .section h2 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            letter-spacing: -0.02em;
        }

        .section-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.6rem;
            box-shadow: 0 10px 30px rgba(26,26,26,0.2);
            flex-shrink: 0;
        }

        .intro {
            font-size: 1.25rem;
            color: var(--text-light);
            margin-bottom: 3rem;
            line-height: 1.8;
            max-width: 900px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            margin-bottom: 4rem;
        }

        @media (max-width: 1024px) {
            .content-grid { grid-template-columns: 1fr; gap: 2.5rem; }
        }

        .card {
            background: var(--white);
            padding: 3rem;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.12);
        }

        .card h3 {
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .tips {
            background: linear-gradient(135deg, #f8f9fa 0%, #f1f3f4 100%);
            border-left: 6px solid var(--primary);
        }

        .tips ul {
            list-style: none;
            padding: 0;
        }

        .tips li {
            padding: 1.3rem 0 1.3rem 2.5rem;
            position: relative;
            font-size: 1.1rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .tips li:last-child { border-bottom: none; }

        .tips li::before {
            content: "→";
            position: absolute;
            left: 0;
            top: 1.3rem;
            color: var(--primary);
            font-weight: 700;
            font-size: 1.4rem;
        }

        .daily-tip {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 3rem;
            border-radius: 20px;
            margin: 4rem 0;
            display: flex;
            align-items: center;
            gap: 2rem;
            box-shadow: 0 20px 60px rgba(26,26,26,0.3);
        }

        .daily-tip i {
            font-size: 2.5rem;
            opacity: 0.9;
            flex-shrink: 0;
        }

        .conclusion {
            background: var(--white);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary);
            box-shadow: 0 15px 50px rgba(0,0,0,0.08);
            border-top: 5px solid var(--primary);
            margin-top: 3rem;
        }

        .section-btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 1.2rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(26,26,26,0.3);
        }

        .section-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(26,26,26,0.4);
        }
